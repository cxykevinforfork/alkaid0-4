arch: ${GOARCH}
version: ${VERSION}

contents:
  # 程序主文件
  - src: ./alkaid0-linux-${BINARY_ARCH}
    dst: /usr/bin/alkaid0

  # 统一中转文件夹
  - src: ./service/
    dst: /usr/share/alkaid0/services/

scripts:
  postinstall: ./post.sh
  preremove: ./clean.sh

overrides:
  deb:
    depends:
      - libc6          # Debian/Ubuntu 的 libc 包
  rpm:
    depends:
      - glibc          # RHEL/Fedora 的 libc 包
  archlinux:
    depends:
      - glibc          # Arch Linux 的 libc 包
  apk:
    depends:
      - musl           # Alpine 的 musl libc 包
