name: Build and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          check-latest: true

      - name: 安装交叉编译工具链和 UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl gcc-mingw-w64-x86-64 gcc-aarch64-linux-gnu

      - name: 执行代码生成
        run: |
          go generate ./...
          go generate product/gen.go

      - name: 构建 Linux amd64 (本机 CGO)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o alkaid0-linux-amd64 .

      - name: 构建 Windows amd64 (交叉编译)
        env:
          CC: x86_64-w64-mingw32-gcc
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o alkaid0-windows-amd64.exe .

      - name: 构建 Linux arm64 (交叉编译)
        env:
          CC: aarch64-linux-gnu-gcc
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" \
            -o alkaid0-linux-arm64 .

      - name: UPX 极限压缩
        run: |
          upx --best --lzma alkaid0-linux-amd64
          upx --best --lzma alkaid0-windows-amd64.exe
          upx --best --lzma alkaid0-linux-arm64

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: alkaid0-linux-windows-binaries
          path: |
            alkaid0-linux-amd64
            alkaid0-windows-amd64.exe
            alkaid0-linux-arm64

  build-darwin:
    runs-on: macos-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          check-latest: true

      - name: 执行代码生成
        run: |
          go generate ./...
          go generate product/gen.go

      - name: 构建 Darwin amd64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o alkaid0-darwin-amd64 .

      - name: 构建 Darwin arm64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" \
            -o alkaid0-darwin-arm64 .

      - name: 上传 Darwin 产物
        uses: actions/upload-artifact@v7
        with:
          name: alkaid0-darwin-binaries
          path: |
            alkaid0-darwin-amd64
            alkaid0-darwin-arm64

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
      fail-fast: false
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          check-latest: true

      - name: 运行测试
        env:
          ALKAID0_DEBUG_MOCKSERVER: "true"
          ALKAID0_CONFIG_PATH: "alklog.log"
          # ALKAID0_TEST_SANDBOX: "true"
          ALKAID0_TEST_LESS_MEMORY_MODE: "true"
        run: |
          go test -v ./...

  build-msix:
    runs-on: windows-latest
    needs: [ build ]
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6

      # 使用官方 Action 安装 WinApp CLI
      - name: Setup winapp CLI
        uses: microsoft/setup-WinAppCli@v0.1

      # 使用 MSYS2 安装 MinGW-w64 GCC
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc   # 安装 MinGW-w64 GCC

      # 图像处理工具（feraxhp.cim）仍然通过 winget 安装
      - name: 安装图像处理工具
        run: |
          winget install --id feraxhp.cim --accept-package-agreements --accept-source-agreements
          echo "C:\Program Files\cim\bin" >> $GITHUB_PATH

      - name: 下载 Windows 二进制产物
        uses: actions/download-artifact@v8
        with:
          name: alkaid0-linux-windows-binaries   # 包含 alkaid0-windows-amd64.exe
          path: ./temp_bin

      - name: 准备 MSIX 目录
        run: |
          cd installer/windows/msix
          copy ..\..\..\temp_bin\alkaid0-windows-amd64.exe .\alkaid0.exe

      - name: 写入证书密钥
        run: |
          echo "${{ secrets.CERT_KEY }}" > installer/windows/msix/.cert.tmp

      - name: 执行打包脚本
        shell: pwsh
        run: |
          cd installer/windows/msix
          .\pack.ps1

      - name: 上传 MSIX 产物
        uses: actions/upload-artifact@v7
        with:
          name: alkaid0-msix
          path: installer/windows/msix/alkaid0-windows-amd64.msix

  build-linux-pkgs:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6

      - name: 下载 Linux 二进制产物
        uses: actions/download-artifact@v8
        with:
          name: alkaid0-linux-windows-binaries   # 包含 alkaid0-windows-amd64.exe
          path: ./temp_bin

      - name: 安装 nFPM
        uses: burningalchemist/action-gh-nfpm@v1

      - name: 准备 nFPM 目录
        run: |
          cd installer/linux
          cp ../../temp_bin/alkaid0-linux-amd64 ./alkaid0-linux-amd64
          cp ../../temp_bin/alkaid0-linux-arm64 ./alkaid0-linux-arm64
          mkdir output
          
      - name: nFPM 打包
        run: |
          cd installer/linux
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null)
          if [ -z "$VERSION" ]; then
              VERSION="0.0.0"
          fi
          VERSION=${VERSION#v}
          export VERSION
          
          BINARY_ARCH=amd64 GOARCH=amd64 nfpm pkg --target ./output/alkaid0-linux-amd64.apk --packager apk
          BINARY_ARCH=amd64 GOARCH=amd64 nfpm pkg --target ./output/alkaid0-linux-amd64.deb --packager deb
          BINARY_ARCH=amd64 GOARCH=amd64 nfpm pkg --target ./output/alkaid0-linux-amd64.pkg.tar.zst --packager archlinux
          BINARY_ARCH=amd64 GOARCH=amd64 nfpm pkg --target ./output/alkaid0-linux-amd64.rpm --packager rpm
          BINARY_ARCH=arm64 GOARCH=arm64 nfpm pkg --target ./output/alkaid0-linux-arm64.apk --packager apk
          BINARY_ARCH=arm64 GOARCH=arm64 nfpm pkg --target ./output/alkaid0-linux-arm64.deb --packager deb
          BINARY_ARCH=arm64 GOARCH=arm64 nfpm pkg --target ./output/alkaid0-linux-arm64.pkg.tar.zst --packager archlinux
          BINARY_ARCH=arm64 GOARCH=arm64 nfpm pkg --target ./output/alkaid0-linux-arm64.rpm --packager rpm

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: alkaid0-linux-pkgs
          path: installer/linux/output/*

  publish:
    runs-on: ubuntu-latest
    needs: [ build, build-darwin, test, build-msix, build-linux-pkgs ]
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write
    steps:
      - name: 下载 Linux/Windows 产物
        uses: actions/download-artifact@v8
        with:
          name: alkaid0-linux-windows-binaries
          path: ./binaries

      - name: 下载 Darwin 产物
        uses: actions/download-artifact@v8
        with:
          name: alkaid0-darwin-binaries
          path: ./binaries

      - name: 下载 MSIX 产物
        uses: actions/download-artifact@v8
        with:
          name: alkaid0-msix
          path: ./binaries

      - name: 上传到 Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./binaries/alkaid0-linux-amd64
            ./binaries/alkaid0-windows-amd64.exe
            ./binaries/alkaid0-linux-arm64
            ./binaries/alkaid0-darwin-amd64
            ./binaries/alkaid0-darwin-arm64
            ./binaries/alkaid0-windows-amd64.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
